<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OmniRAG Agent — ReAct Reasoning</title>
    <meta name="description" content="Query the OmniRAG agent with multi-step reasoning using PDF and web search tools." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            boxShadow: {
              glow: "0 0 40px rgba(16, 185, 129, 0.12)",
            },
            keyframes: {
              slideUp: {
                "0%": { opacity: "0", transform: "translateY(18px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
            },
            animation: {
              slideUp: "slideUp 360ms ease-out",
            },
          },
        },
      };
    </script>
    <style>
      #answer-text { white-space: pre-wrap; line-height: 1.75; }
      .cursor::after {
        content: '▋';
        display: inline-block;
        animation: blink 0.9s step-end infinite;
        color: #10b981;
        font-size: 0.9em;
        margin-left: 1px;
      }
      @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-5 py-8 sm:px-8">
      <!-- Header -->
      <header class="mb-8 flex flex-col gap-3 border-b border-slate-800 pb-6 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.28em] text-emerald-400">OmniRAG Agent</p>
          <h1 class="mt-2 text-3xl font-semibold tracking-tight text-white sm:text-4xl">ReAct Reasoning Engine</h1>
          <p class="mt-3 max-w-2xl text-sm leading-6 text-slate-400">
            Query with multi-step reasoning. The agent thinks through problems step-by-step using PDF and web search tools.
          </p>
        </div>
        <div class="rounded-full border border-slate-800 px-4 py-2 text-xs text-slate-400">
          Reasoning Mode
        </div>
      </header>

      <!-- Search Input (Always Visible) -->
      <div id="search-container" class="rounded-2xl border border-slate-800 bg-slate-950/40 p-4 mb-6">
        <label for="agent-input" class="block text-xs font-semibold uppercase tracking-[0.2em] text-slate-500 mb-3">Your Question</label>
        <textarea
          id="agent-input"
          rows="2"
          placeholder="How does the PDF explain pump maintenance? Compare PDF answers with web sources..."
          class="w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-sm text-white placeholder-slate-500 resize-none transition hover:border-emerald-500"
          style="min-height:60px"
        ></textarea>
        <div class="mt-4 flex justify-end">
          <button
            id="agent-btn"
            class="flex items-center gap-2 rounded-xl bg-emerald-600 px-5 py-2 text-sm font-semibold text-white transition hover:bg-emerald-500"
          >
            <span id="btn-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
            </span>
            <span id="btn-label">Ask Agent</span>
          </button>
        </div>
      </div>

      <!-- Main Content -->
      <section class="flex flex-1 flex-col gap-6">
        <!-- Hero Section (Instructions) -->
        <div id="hero" class="rounded-2xl border border-slate-800 bg-slate-900/50 p-5 shadow-glow">
          <div class="mb-4 inline-flex items-center gap-2 rounded-full border border-emerald-500/40 bg-emerald-500/10 px-3 py-1 text-xs font-medium text-emerald-400">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            ReAct Loop · Multi-Step Reasoning · PDF + Web
          </div>
          <h2 class="mt-4 text-2xl font-semibold text-white">Ask complex questions with reasoning</h2>
        </div>

        <!-- Reasoning Steps -->
        <div id="reasoning" class="hidden rounded-2xl border border-slate-800 bg-slate-900/50 p-5 shadow-glow">
          <p class="text-xs font-semibold uppercase tracking-[0.24em] text-emerald-400 mb-4">Reasoning Steps</p>
          <div id="steps-list" class="space-y-3"></div>
        </div>

        <!-- Results Area -->
        <div id="results" class="flex flex-col gap-6"></div>

        <!-- Error Banner -->
        <div id="error-banner" class="hidden rounded-2xl border border-red-500/40 bg-red-950/50 p-4">
          <div class="flex items-start gap-3">
            <svg class="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <div>
              <p class="text-sm font-semibold text-red-300 mb-0.5">Error</p>
              <p id="error-text" class="text-xs text-slate-400"></p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
